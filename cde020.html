<!DOCTYPE html>

<title>Credencial CDE</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#F3E5CF;
    margin:0;
    padding:30px;
}

.card{
    max-width:800px;
    margin:auto;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.header{
    background:#2F1D12;
    color:white;
    text-align:center;
    padding:30px;
}

.header h1{
    margin:0;
    font-size:38px;
}

.header p{
    margin:5px 0 0;
    opacity:.8;
}

.content{
    display:flex;
    padding:30px;
    gap:30px;
}

.photo{
    width:220px;
    height:220px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid #C99658;
}

.info{
    flex:1;
}

.name{
    font-size:32px;
    font-weight:bold;
    color:#2F1D12;
    margin-bottom:15px;
}

.item{
    margin:10px 0;
    font-size:20px;
}

.badge{
    display:inline-block;
    background:#28a745;
    color:white;
    padding:10px 20px;
    border-radius:30px;
    margin-top:15px;
    font-weight:bold;
}

.footer{
    background:#EBD8BC;
    text-align:center;
    padding:20px;
    color:#2F1D12;
}
</style>

</head>
